[workspace]
resolver = "2"
# Only include WASM extension that doesn't need neomind-core dependency
members = [
    "extensions/weather-forecast",
]
exclude = [
    "extensions/as-hello",              # AssemblyScript project (not Rust)
    "extensions/test-dashboard-component",  # Frontend-only component (not Rust)
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["NeoMind"]
license = "MIT"

[workspace.dependencies]
# Minimal dependencies for WASM extensions
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
urlencoding = "2.1"

# Note: Native extensions (image-analyzer, yolo-video) require
# the full NeoMind workspace and are built locally.
