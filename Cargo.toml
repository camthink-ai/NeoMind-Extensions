[workspace]
resolver = "2"
members = [
    "extensions/*",
]
exclude = [
    "extensions/as-hello",              # AssemblyScript project (not Rust)
    "extensions/weather-forecast-wasm", # WASM project
    "extensions/test-dashboard-component",  # Frontend-only component (not Rust)
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["NeoMind"]
license = "MIT"

[workspace.dependencies]
# Minimal dependencies for WASM extensions (weather-forecast)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
urlencoding = "2.1"

# For native extensions, use local development setup
# They require the full NeoMind workspace
[patch.crates-io]
# Local development patches can be added here
