name: Build Native Extensions V2

on:
  push:
    branches: [main]
    paths:
      - 'extensions/image-analyzer-v2/**'
      - 'extensions/yolo-video-v2/**'
      - '.github/workflows/build-native-extensions.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NEOMIND_REPO: 'camthink-ai/NeoMind'

jobs:
  build-native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (Apple Silicon)
          - os: macos-latest
            extension: image-analyzer-v2
            target: aarch64-apple-darwin
          - os: macos-latest
            extension: yolo-video-v2
            target: aarch64-apple-darwin
          - os: macos-latest
            extension: weather-forecast-v2
            target: aarch64-apple-darwin

          # Linux (x86_64)
          - os: ubuntu-latest
            extension: image-analyzer-v2
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            extension: yolo-video-v2
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            extension: weather-forecast-v2
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout extension repo
        uses: actions/checkout@v4

      - name: Checkout NeoMind core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NEOMIND_REPO }}
          path: NeoMind

      - name: Setup workspace structure
        run: |
          # Move NeoMind to parent directory to match Cargo.toml paths
          mv NeoMind ../NeoMind

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zip jq pkg-config \
            libssl-dev libglib2.0-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zip jq

      - name: Build native extension
        shell: bash
        run: |
          set -e

          EXT="${{ matrix.extension }}"
          echo "======================================"
          echo "Building $EXT for ${{ matrix.target }}"
          echo "======================================"

          # Build using workspace
          cargo build --release -p "${EXT//-/_}"

          # Determine extension based on platform
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            EXT_LIB="dylib"
            PLATFORM="darwin_aarch64"
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            EXT_LIB="dll"
            PLATFORM="windows_amd64"
          else
            EXT_LIB="so"
            PLATFORM="linux_amd64"
          fi

          # Convert extension name to library name
          LIB_NAME=$(echo "$EXT" | tr '-' '_')
          LIB_FILE="target/release/libneomind_extension_${LIB_NAME}.${EXT_LIB}"

          echo "Looking for: $LIB_FILE"

          if [ ! -f "$LIB_FILE" ]; then
            echo "Error: Library not found"
            find target -name "*.dylib" -o -name "*.so" -o -name "*.dll" || true
            exit 1
          fi

          echo "Found library: $LIB_FILE"

          # Create package directory
          mkdir -p "dist/${EXT}/binaries/${PLATFORM}"
          mkdir -p "dist/${EXT}/frontend"

          # Copy binary
          cp "$LIB_FILE" "dist/${EXT}/binaries/${PLATFORM}/"

          # Copy frontend if exists
          if [ -d "extensions/$EXT/frontend/dist" ]; then
            cp -r "extensions/$EXT/frontend/dist"/* "dist/${EXT}/frontend/" 2>/dev/null || true
          fi

          # Copy frontend.json if exists
          if [ -f "extensions/$EXT/frontend/frontend.json" ]; then
            cp "extensions/$EXT/frontend/frontend.json" "dist/${EXT}/"
          fi

          # Get version from Cargo.toml
          VERSION=$(grep -m1 'version = ' "extensions/$EXT/Cargo.toml" | sed 's/.*version = "\([^"]*\)".*/\1/' || echo "2.0.0")

          # Create manifest.json
          cat > "dist/${EXT}/manifest.json" << EOF
          {
            "format": "neomind-extension-package",
            "format_version": "2.0",
            "abi_version": 3,
            "id": "$EXT",
            "name": "$(echo $EXT | sed 's/-v2$//' | sed 's/-/ /g')",
            "version": "$VERSION",
            "sdk_version": "2.0.0",
            "type": "native",
            "binaries": {
              "$PLATFORM": "binaries/${PLATFORM}/$(basename $LIB_FILE)"
            },
            "frontend": "frontend/",
            "permissions": [],
            "config_parameters": [],
            "metrics": [],
            "commands": []
          }
          EOF

          # Build .nep package
          cd "dist/${EXT}"
          PACKAGE_NAME="${EXT}-${VERSION}-${PLATFORM}.nep"
          zip -qr "../../$PACKAGE_NAME" .
          cd ../..

          echo "✓ Built: $PACKAGE_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nep-native-${{ matrix.extension }}-${{ matrix.target }}
          path: dist/*.nep
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build-native
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nep-native-*
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="2.0.0"

          cat > /tmp/release_notes.md << 'EOF'
          # NeoMind Extension Packages V2

          ## Native Extensions (ABI Version 3)

          | Extension | Platform | Size |
          |-----------|----------|------|
          | **weather-forecast-v2** | macOS (ARM64), Linux (x64) | ~180KB |
          | **image-analyzer-v2** | macOS (ARM64), Linux (x64) | ~7MB |
          | **yolo-video-v2** | macOS (ARM64), Linux (x64) | ~7MB |

          ## Installation

          Via NeoMind Web UI or API:

          ```bash
          curl -X POST http://localhost:9375/api/extensions/upload/file \
            -H 'Content-Type: application/octet-stream' \
            --data-binary @package.nep
          ```

          ## Requirements

          - NeoMind >= 0.5.0
          - ABI Version 3 support
          EOF

          if gh release view "v$VERSION" &>/dev/null; then
            echo "Release v$VERSION exists, uploading packages..."
          else
            gh release create "v$VERSION" \
              --title "NeoMind Extensions V2" \
              --notes-file /tmp/release_notes.md
          fi

          # Upload packages
          for nep in dist/*.nep; do
            [ -f "$nep" ] || continue
            echo "Uploading: $(basename "$nep")"
            gh release upload "v$VERSION" "$nep" --clobber
          done
          echo "✓ Done!"
