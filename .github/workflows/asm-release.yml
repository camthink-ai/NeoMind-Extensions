# NeoMind WASM Extensions - Automated Release Workflow
#
# This workflow builds Rust-based WASM extensions when a version tag is pushed.
# WASM extensions are detected by having a Cargo.toml with crate-type = ["cdylib"]
# and are built with cargo build --target wasm32-unknown-unknown.

name: Build WASM Extensions

on:
  # Only trigger manually - native builds are handled by build-nep-packages.yml
  # WASM builds are only needed for explicit wasm32 targets
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Find WASM extensions
        id: find-extensions
        run: |
          # Find Rust extensions with cdylib crate type (WASM candidates)
          EXTENSIONS=""
          for dir in extensions/*/; do
            if [ -f "$dir/Cargo.toml" ] && grep -q 'cdylib' "$dir/Cargo.toml"; then
              EXT_NAME=$(basename "$dir")
              if [ -n "$EXTENSIONS" ]; then
                EXTENSIONS="$EXTENSIONS,$EXT_NAME"
              else
                EXTENSIONS="$EXT_NAME"
              fi
            fi
          done
          echo "extensions=$EXTENSIONS" >> $GITHUB_OUTPUT
          echo "Found WASM extensions: $EXTENSIONS"

      - name: Build all WASM extensions
        run: |
          EXTENSIONS="${{ steps.find-extensions.outputs.extensions }}"
          if [ -z "$EXTENSIONS" ]; then
            echo "No WASM extensions found — skipping WASM build."
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi

          for EXT in ${EXTENSIONS//,/ }; do
            echo "================================"
            echo "Building WASM extension: $EXT"
            echo "================================"

            # Determine library name from Cargo.toml [lib] name field
            LIB_NAME=$(grep -A1 '^\[lib\]' "extensions/$EXT/Cargo.toml" | grep '^name' | sed 's/.*=.*"\([^"]*\)".*/\1/')
            if [ -z "$LIB_NAME" ]; then
              LIB_NAME=$(echo "$EXT" | tr '-' '_')
            fi

            cargo build --target wasm32-unknown-unknown --release -p "$LIB_NAME" 2>&1 || \
            cargo build --target wasm32-unknown-unknown --release -p "$EXT" 2>&1

            WASM_FILE="target/wasm32-unknown-unknown/release/${LIB_NAME}.wasm"
            if [ ! -f "$WASM_FILE" ]; then
              echo "ERROR: WASM file not found: $WASM_FILE"
              ls -la target/wasm32-unknown-unknown/release/*.wasm 2>/dev/null || true
              exit 1
            fi

            WASM_SIZE=$(ls -lh "$WASM_FILE" | awk '{print $5}')
            echo "Built: $WASM_FILE ($WASM_SIZE)"
          done

      - name: Extract version from tag
        id: version
        if: env.skip != 'true'
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Prepare release artifacts
        if: env.skip != 'true'
        run: |
          EXTENSIONS="${{ steps.find-extensions.outputs.extensions }}"
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release

          for EXT in ${EXTENSIONS//,/ }; do
            echo "Packaging extension: $EXT"

            # Determine library name
            LIB_NAME=$(grep -A1 '^\[lib\]' "extensions/$EXT/Cargo.toml" | grep '^name' | sed 's/.*=.*"\([^"]*\)".*/\1/')
            if [ -z "$LIB_NAME" ]; then
              LIB_NAME=$(echo "$EXT" | tr '-' '_')
            fi

            WASM_FILE="target/wasm32-unknown-unknown/release/${LIB_NAME}.wasm"
            if [ ! -f "$WASM_FILE" ]; then
              echo "Warning: WASM file not found for $EXT"
              continue
            fi

            # Create .nep package (WASM extensions are platform-independent)
            NEP_NAME="${EXT}-${VERSION}.nep"
            cp "$WASM_FILE" "release/${NEP_NAME}"

            echo "  Packaged: $NEP_NAME ($(ls -lh "$WASM_FILE" | awk '{print $5}'))"
          done

          echo ""
          echo "All packages:"
          ls -lh release/

      - name: Upload WASM packages to release
        if: env.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if ! gh release view "v$VERSION" &>/dev/null; then
            echo "Creating new release v$VERSION for WASM packages..."
            gh release create "v$VERSION" \
              --title "NeoMind Extensions v${VERSION}" \
              --notes "WASM extension packages for v${VERSION}"
          fi

          for nep in release/*.nep; do
            [ -f "$nep" ] || continue
            echo "Uploading: $(basename "$nep")"
            gh release upload "v$VERSION" "$nep" --clobber
          done
          echo "WASM packages uploaded to release v$VERSION"

      - name: Release summary
        if: env.skip != 'true'
        run: |
          echo "## WASM Extension Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### WASM Packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh release/*.nep >> $GITHUB_STEP_SUMMARY || echo "No packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Skip summary
        if: env.skip == 'true'
        run: |
          echo "## WASM Extension Build - Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No WASM extensions found in repository." >> $GITHUB_STEP_SUMMARY
