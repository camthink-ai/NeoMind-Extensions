name: Build Extension

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Extension name'
        required: true
        default: 'weather-forecast-v2'
        type: choice
        options:
          - weather-forecast-v2
          - image-analyzer-v2
          - yolo-video-v2
      release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NEOMIND_REPO: 'camthink-ai/NeoMind'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin_aarch64
          - os: ubuntu-latest
            platform: linux_amd64

    steps:
      - name: Checkout extension repo
        uses: actions/checkout@v4

      - name: Checkout NeoMind core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NEOMIND_REPO }}
          path: neomind

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zip jq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zip jq

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build extension
        run: |
          EXT="${{ inputs.extension }}"
          echo "Building: $EXT"
          chmod +x build.sh scripts/package.sh
          bash scripts/package.sh -d "extensions/$EXT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nep-${{ inputs.extension }}-${{ matrix.platform }}
          path: dist/*.nep
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.release == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nep-${{ inputs.extension }}-*
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="2.0.0"
          EXT="${{ inputs.extension }}"

          if gh release view "v$VERSION" &>/dev/null; then
            echo "Uploading to existing release v$VERSION"
          else
            gh release create "v$VERSION" \
              --title "NeoMind Extensions V2" \
              --notes "NeoMind Extension Packages V2 (ABI Version 3)"
          fi

          for nep in dist/*.nep; do
            [ -f "$nep" ] || continue
            echo "Uploading: $(basename "$nep")"
            gh release upload "v$VERSION" "$nep" --clobber
          done
          echo "✓ Done!"
