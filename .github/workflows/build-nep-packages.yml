name: Build .nep Packages V2

# NeoMind Extension SDK V2 - Process Isolation Architecture
# All extensions run in isolated processes with IPC communication
# ABI Version: 3
# Updated: usls 0.1.11 API compatibility

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'scripts/**'
      - 'build.sh'
      - 'VERSION'
      - 'release.sh'
      - '.github/workflows/build-nep-packages.yml'
  workflow_dispatch:
    inputs:
      extension:
        description: 'Extension name (build all if empty)'
        required: false
        default: ''
      release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NEOMIND_REPO: 'camthink-ai/NeoMind'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS platforms (ARM64 only - Apple Silicon)
          - os: macos-latest
            platform: darwin_aarch64
            target: aarch64-apple-darwin
          # Linux platforms
          # Use ubuntu-22.04 for glibc 2.35 compatibility (supports Ubuntu 22.04+)
          - os: ubuntu-22.04
            platform: linux_amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            platform: linux_arm64
            target: aarch64-unknown-linux-gnu
          # Windows platforms
          - os: windows-latest
            platform: windows_amd64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            platform: windows_x86
            target: i686-pc-windows-msvc

    steps:
      - name: Checkout extension repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read version from VERSION file
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Checkout NeoMind core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NEOMIND_REPO }}
          path: NeoMind

      - name: Setup workspace structure
        run: |
          # Move NeoMind to parent directory to match Cargo.toml paths
          mv NeoMind ../NeoMind
        shell: bash

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zip jq pkg-config libssl-dev patchelf \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev

      - name: Install ONNX Runtime (Ubuntu 22.04 compatible)
        if: runner.os == 'Linux'
        run: |
          # ONNX Runtime 1.22.0 - matches ort crate 2.0.0-rc.10 (ORT_API_VERSION=22)
          # Verified: no __isoc23 symbols, compatible with glibc 2.35 (Ubuntu 22.04)
          ORT_VERSION="1.22.0"

          if [ "${{ matrix.platform }}" = "linux_amd64" ]; then
            ORT_ARCH="x64"
          else
            # ARM64 uses 'aarch64' in ONNX Runtime naming
            ORT_ARCH="aarch64"
          fi

          ORT_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-${ORT_ARCH}-${ORT_VERSION}.tgz"

          echo "Downloading ONNX Runtime from: $ORT_URL"
          curl -L -o /tmp/onnxruntime.tgz "$ORT_URL"
          tar -xzf /tmp/onnxruntime.tgz -C /tmp

          ORT_DIR="/tmp/onnxruntime-linux-${ORT_ARCH}-${ORT_VERSION}"

          # Set library path for ort crate to find the library
          echo "ORT_LIB_PATH=$ORT_DIR/lib" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$ORT_DIR/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

          # Create pkg-config file so ort-sys links against the correct version
          mkdir -p $ORT_DIR/lib/pkgconfig
          cat > $ORT_DIR/lib/pkgconfig/libonnxruntime.pc << EOF
          prefix=$ORT_DIR
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libonnxruntime
          Description: ONNX Runtime
          Version: $ORT_VERSION
          Libs: -L\${libdir} -lonnxruntime
          Cflags: -I\${includedir}
          EOF
          echo "PKG_CONFIG_PATH=$ORT_DIR/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

          # Verify no __isoc23_ symbols (glibc 2.38+)
          echo "Verifying glibc compatibility..."
          if nm -D $ORT_DIR/lib/libonnxruntime.so | grep -q __isoc23; then
            echo "ERROR: ONNX Runtime contains __isoc23_ symbols (requires glibc 2.38+)"
            exit 1
          fi
          echo "✓ ONNX Runtime is compatible with glibc 2.35+"

      - name: Install ONNX Runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          # ONNX Runtime 1.22.0 - matches ort crate 2.0.0-rc.10 (ORT_API_VERSION=22)
          ORT_VERSION="1.22.0"
          ORT_ARCH="arm64"

          ORT_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-${ORT_ARCH}-${ORT_VERSION}.tgz"

          echo "Downloading ONNX Runtime from: $ORT_URL"
          curl -L -o /tmp/onnxruntime.tgz "$ORT_URL"
          tar -xzf /tmp/onnxruntime.tgz -C /tmp

          ORT_DIR="/tmp/onnxruntime-osx-${ORT_ARCH}-${ORT_VERSION}"

          # Set library path for ort crate
          echo "ORT_LIB_PATH=$ORT_DIR/lib" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$ORT_DIR/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

          # Create pkg-config file so ort-sys links against the correct version
          mkdir -p $ORT_DIR/lib/pkgconfig
          cat > $ORT_DIR/lib/pkgconfig/libonnxruntime.pc << EOF
          prefix=$ORT_DIR
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libonnxruntime
          Description: ONNX Runtime
          Version: $ORT_VERSION
          Libs: -L\${libdir} -lonnxruntime
          Cflags: -I\${includedir}
          EOF
          echo "PKG_CONFIG_PATH=$ORT_DIR/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Install ONNX Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # ONNX Runtime 1.22.0 - matches ort crate 2.0.0-rc.10 (ORT_API_VERSION=22)
          $ORT_VERSION = "1.22.0"

          if ("${{ matrix.platform }}" -eq "windows_amd64") {
            $ORT_ARCH = "x64"
          } else {
            $ORT_ARCH = "x86"
          }

          $ORT_URL = "https://github.com/microsoft/onnxruntime/releases/download/v$ORT_VERSION/onnxruntime-win-$ORT_ARCH-$ORT_VERSION.zip"

          Write-Host "Downloading ONNX Runtime from: $ORT_URL"
          Invoke-WebRequest -Uri $ORT_URL -OutFile "C:\onnxruntime.zip"
          Expand-Archive -Path "C:\onnxruntime.zip" -DestinationPath "C:\"

          # Set library path for ort crate
          $ORT_PATH = "C:\onnxruntime-win-$ORT_ARCH-$ORT_VERSION\lib"
          Write-Host "ORT_LIB_PATH=$ORT_PATH"
          echo "ORT_LIB_PATH=$ORT_PATH" >> $env:GITHUB_ENV
          echo "$ORT_PATH" >> $env:GITHUB_PATH

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Pin FFmpeg 7.x — ffmpeg-sys-next 7.1.3 requires avfft.h (removed in FFmpeg 8)
          brew install zip jq ffmpeg@7 pkg-config
          # Verify pkg-config can find FFmpeg
          export PKG_CONFIG_PATH="/opt/homebrew/opt/ffmpeg@7/lib/pkgconfig"
          pkg-config --cflags-only-I libavcodec
          # Set FFmpeg paths for ffmpeg-sys-next crate
          echo "FFMPEG_DIR=/opt/homebrew/opt/ffmpeg@7" >> $GITHUB_ENV
          echo "CPATH=/opt/homebrew/opt/ffmpeg@7/include:$CPATH" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/opt/homebrew/opt/ffmpeg@7/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/opt/homebrew/opt/ffmpeg@7/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install zip -y
          choco install jq -y
          # BtbN only provides win64 shared builds; skip FFmpeg for x86
          if ("${{ matrix.platform }}" -eq "windows_amd64") {
            # Use gyan.dev FFmpeg 7.1 shared build — ffmpeg-sys-next 7.x requires avfft.h (removed in FFmpeg 8)
            $FFMPEG_URL = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-7.1-full_shared-with-bin.7z"
            Write-Host "Downloading FFmpeg 7.1 shared build from: $FFMPEG_URL"
            Invoke-WebRequest -Uri $FFMPEG_URL -OutFile "C:\ffmpeg.7z"
            7z x "C:\ffmpeg.7z" -o"C:\ffmpeg" -y
            $ffmpegDir = Get-ChildItem "C:\ffmpeg" -Directory | Select-Object -First 1
            Write-Host "FFmpeg dir: $($ffmpegDir.FullName)"
            echo "FFMPEG_DIR=$($ffmpegDir.FullName)" >> $env:GITHUB_ENV
            echo "$($ffmpegDir.FullName)\bin" >> $env:GITHUB_PATH
            # Tell bindgen/clang where FFmpeg headers are
            echo "BINDGEN_EXTRA_CLANG_ARGS=-I$($ffmpegDir.FullName)\include" >> $env:GITHUB_ENV
          } else {
            Write-Host "Skipping FFmpeg for windows_x86 (no shared build available; yolo-video-v2 will not be built)"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show version
        run: |
          echo "Building version: $(cat VERSION)"
        shell: bash

      - name: Build extensions
        run: |
          chmod +x build.sh
          # Create /usr/local/include symlinks for ffmpeg-sys-next's hardcoded fallback path
          # Note: /usr/include is read-only on macOS CI (SIP), but /usr/local/include works
          if [ "$RUNNER_OS" = "macOS" ] && [ -d "/opt/homebrew/opt/ffmpeg/include" ]; then
            sudo mkdir -p /usr/local/include
            for dir in /opt/homebrew/opt/ffmpeg/include/libav*; do
              sudo ln -sf "$dir" "/usr/local/include/$(basename "$dir")"
            done
          fi
          if [ "$RUNNER_OS" = "Windows" ] && [ -n "$FFMPEG_DIR" ] && [ -d "$FFMPEG_DIR/include" ]; then
            mkdir -p /usr/include
            for dir in "$FFMPEG_DIR"/include/libav*; do
              cp -r "$dir" "/usr/include/$(basename "$dir")"
            done
          fi
          ./build.sh --yes --skip-install
        shell: bash

      - name: List built packages
        run: |
          echo "=== Built packages ==="
          ls -lh dist/ || echo "No packages found"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nep-packages-${{ matrix.platform }}
          path: dist/*.nep
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    # Always create release when VERSION file changes on main,
    # or when manually triggered with release=true
    if: >
      github.ref == 'refs/heads/main' &&
      ((github.event_name == 'push') ||
       (github.event_name == 'workflow_dispatch' && inputs.release == 'true'))
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nep-packages-*
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"

          # Generate extension list from built packages
          EXT_TABLE=""
          for nep in dist/*.nep; do
            [ -f "$nep" ] || continue
            name=$(basename "$nep" | sed 's/-[0-9].*//')
            EXT_TABLE="${EXT_TABLE}| **${name}** | ${name} |\n"
          done

          cat > /tmp/release_notes.md << EOF
          # NeoMind Extension Packages v${VERSION}

          ## Architecture: Process Isolation

          All extensions run in isolated processes:
          - **Crash Safety**: Extension crashes don't affect the main NeoMind process
          - **Memory Isolation**: Each extension has its own memory space
          - **Independent Lifecycle**: Extensions can be restarted independently

          ## Platform Support

          | Platform | Architecture |
          |----------|--------------|
          | macOS | ARM64, x86_64 |
          | Linux | x86_64, ARM64 |
          | Windows | x86_64, x86 |

          ## Packages

          $(ls dist/*.nep 2>/dev/null | while read f; do echo "- \`$(basename $f)\`"; done)

          ## Installation

          Via NeoMind Web UI or API:

          \`\`\`bash
          curl -X POST http://localhost:9375/api/extensions/upload/file \\
            -H 'Content-Type: application/octet-stream' \\
            --data-binary @package.nep
          \`\`\`

          ## Requirements

          - NeoMind >= 0.5.0
          - ABI Version 3 support
          EOF

          if gh release view "v$VERSION" &>/dev/null; then
            echo "Release v$VERSION exists, updating packages..."
            gh release edit "v$VERSION" --notes-file /tmp/release_notes.md
          else
            gh release create "v$VERSION" \
              --title "NeoMind Extensions v${VERSION}" \
              --notes-file /tmp/release_notes.md
          fi

          # Upload packages
          for nep in dist/*.nep; do
            [ -f "$nep" ] || continue
            echo "Uploading: $(basename "$nep")"
            gh release upload "v$VERSION" "$nep" --clobber
          done
          echo "✓ Packages uploaded to release v$VERSION"